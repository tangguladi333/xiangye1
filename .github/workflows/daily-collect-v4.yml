name: Daily Collect V4

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r v4-production/requirements.txt

      - name: Run LangGraph workflow
        run: python v4-production/workflows/graph.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BUDGET_YUAN: ${{ secrets.BUDGET_YUAN || '0.5' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL || '' }}

      - name: Validate articles
        run: python v4-production/hooks/validate_json.py v4-production/knowledge/articles/*.json || true

      - name: Push Feishu digest
        run: |
          python -c "
          import asyncio, sys;
          sys.path.insert(0, 'v4-production');
          from distribution.publisher import publish_daily_digest;
          asyncio.run(publish_daily_digest())
          "
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Commit and push if new articles exist
        run: |
          DATE=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')

          if [ -z "$(git status --porcelain v4-production/knowledge/)" ]; then
            echo "No new articles, skipping commit"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add v4-production/knowledge/
          git commit -m "chore(v4): collect articles on $DATE"
          git push
